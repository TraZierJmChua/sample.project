<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Space Shooter</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        #ui {
            margin-bottom: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Game State
        let score = 0;
        let gameOver = false;
        let keys = {};

        // Player Ship
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 60,
            width: 40,
            height: 30,
            speed: 6,
            color: "#00ffcc"
        };

        // Arrays for game objects
        let bullets = [];
        let enemies = [];
        
        // Enemy configuration
        const enemyRows = 3;
        const enemyCols = 8;
        const enemyWidth = 40;
        const enemyHeight = 30;
        let enemySpeed = 1;
        let enemyDirection = 1; // 1 = right, -1 = left

        // Initialize Enemies
        function initEnemies() {
            enemies = [];
            for (let row = 0; row < enemyRows; row++) {
                for (let col = 0; col < enemyCols; col++) {
                    enemies.push({
                        x: col * (enemyWidth + 20) + 50,
                        y: row * (enemyHeight + 20) + 50,
                        width: enemyWidth,
                        height: enemyHeight,
                        color: `hsl(${row * 100}, 100%, 60%)`
                    });
                }
            }
        }

        // Input Listeners
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        // Shoot bullet
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && !gameOver) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    speed: 8,
                    color: "#ffff00"
                });
            }
            if (e.code === "KeyR" && gameOver) {
                resetGame();
            }
        });

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            gameOver = false;
            player.x = canvas.width / 2 - 20;
            bullets = [];
            enemySpeed = 1;
            initEnemies();
            animate();
        }

        // Collision detection helper
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update game logic
        function update() {
            if (gameOver) return;

            // Move Player
            if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

            // Move Bullets
            bullets.forEach((bullet, bIndex) => {
                bullet.y -= bullet.speed;
                // Remove off-screen bullets
                if (bullet.y < 0) bullets.splice(bIndex, 1);
            });

            // Move Enemies
            let shiftDown = false;
            enemies.forEach(enemy => {
                enemy.x += enemySpeed * enemyDirection;
                if (enemy.x + enemy.width > canvas.width || enemy.x < 0) {
                    shiftDown = true;
                }
                // Check if enemies reached the player
                if (enemy.y + enemy.height >= player.y) {
                    gameOver = true;
                }
            });

            if (shiftDown) {
                enemyDirection *= -1;
                enemies.forEach(enemy => enemy.y += 20);
            }

            // Bullet & Enemy Collision
            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy, eIndex) => {
                    if (checkCollision(bullet, enemy)) {
                        bullets.splice(bIndex, 1);
                        enemies.splice(eIndex, 1);
                        score += 10;
                        scoreElement.innerText = score;
                    }
                });
            });

            // Respawn wave if all clear
            if (enemies.length === 0) {
                enemySpeed += 0.5; // Make it harder
                initEnemies();
            }
        }

        // Render everything
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player (Triangle ship)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // Draw Bullets
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });

            // Draw Enemies
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                // Simple alien "eyes"
                ctx.fillStyle = "#000";
                ctx.fillRect(enemy.x + 8, enemy.y + 8, 6, 6);
                ctx.fillRect(enemy.x + 26, enemy.y + 8, 6, 6);
            });

            // Game Over Screen
            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ff3333";
                ctx.font = "40px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = "#fff";
                ctx.font = "20px 'Courier New'";
                ctx.fillText("Press 'R' to Restart", canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        // Main game loop
        function animate() {
            update();
            draw();
            if (!gameOver) {
                requestAnimationFrame(animate);
            }
        }

        // Start the game initially
        initEnemies();
        animate();
    </script>
</body>
</html>
